services:
  app:
    image: mcr.microsoft.com/devcontainers/javascript-node:1-22-bookworm
    working_dir: /workspaces/${LOCAL_WORKSPACE_FOLDER_BASENAME}
    volumes:
      - ..:/workspaces/${LOCAL_WORKSPACE_FOLDER_BASENAME}:cached
    command: sleep infinity
    environment:
      PORT: 3390
      HOST: 0.0.0.0
      VITE_PORT: 8080
      VITE_API_PROXY_TARGET: http://127.0.0.1:3390
      CLIENT_URL: http://127.0.0.1:8080
      DB_PROVIDER: postgres
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: postgres
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      DB_SCHEMA: neoview_schema
      VECTOR_PROVIDER: chromadb
      CHROMA_URL: http://chromadb:8000
      NODE_ENV: development
    depends_on:
      - postgres
      - chromadb

  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data

  chromadb:
    image: chromadb/chroma:latest
    restart: unless-stopped
    volumes:
      - chroma-data:/chroma/chroma

volumes:
  postgres-data:
  chroma-data:
