name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            server/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Install backend dependencies
        run: npm ci --prefix server

      - name: Create local env files
        run: |
          cp .env.example .env
          cp server/.env.example server/.env

      - name: Verify setup
        run: npm run verify:setup

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Backend tests
        run: npm --prefix server run test
